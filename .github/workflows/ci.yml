name: ci

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-format:
    name: lint + format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      - run: bun run format:check
      - run: bun run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      # Prisma generate 仅读 schema.prisma 生成 client 类型,不连 DB,
      # 但 schema validator 要 DATABASE_URL 存在(任意值即可)。
      - name: prisma generate
        run: bun run --cwd backend prisma:generate
        env:
          DATABASE_URL: mysql://ci:ci@127.0.0.1:3306/ci

      - run: bun run typecheck
        env:
          DATABASE_URL: mysql://ci:ci@127.0.0.1:3306/ci
          JWT_SECRET: ci_dummy_secret_long_enough_to_pass_validation

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      - name: prisma generate
        run: bun run --cwd backend prisma:generate
        env:
          DATABASE_URL: mysql://ci:ci@127.0.0.1:3306/ci

      - run: bun run --cwd backend test
        env:
          DATABASE_URL: mysql://ci:ci@127.0.0.1:3306/ci
          JWT_SECRET: ci_dummy_secret_long_enough_to_pass_validation

      # widget 渲染链路：sharp 必须能解析 SVG。runner 自带 libfontconfig，
      # ubuntu-latest 自带常见字体，足以过 smoke；docker image 里有专门的 font-noto-cjk。
      - run: bun run --cwd backend smoke:svg

  frontend-build:
    name: frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      - run: bun run --cwd frontend build
