name: ci

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# typecheck / test 运行时需要的占位配置,任意值即可(不连真实 DB)。
env:
  DATABASE_URL: mysql://ci:ci@127.0.0.1:3306/ci
  JWT_SECRET: ci_dummy_secret_long_enough_to_pass_validation

jobs:
  lint-format:
    name: lint + format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: bun run format:check
      - run: bun run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          prisma: 'true'
      - run: bun run typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          prisma: 'true'
      - run: bun run --cwd backend test

  frontend-build:
    name: frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: bun run --cwd frontend build
